<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" th:href="@{/assets/img/logo.png}">
  <link rel="icon" type="image/png" th:href="@{/assets/img/logo.png}">
  <title>Quản lý thiết bị - HUST MEDICAL</title>
  
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link th:href="@{/assets/css/nucleo-icons.css}" rel="stylesheet" />
  <link th:href="@{/assets/css/nucleo-svg.css}" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link id="pagestyle" th:href="@{/assets/css/material-dashboard.css(v='3.2.0')}" rel="stylesheet" />
  <style>
    input[readonly], 
    input:disabled,
    select:disabled,
    textarea[readonly] {
      cursor: not-allowed !important;
      background-color: #f0f2f5 !important;
      opacity: 0.8;
    }

    .input-group.input-group-static input[readonly] {
      border-bottom: 1px dashed #d2d6da;
    }
  </style>
</head>

<body class="g-sidenav-show bg-gray-100">
  <aside th:replace="~{fragments/sidebar :: sidebar('devices')}"></aside>
    
  <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg">
      <div class="container-fluid py-4">
          <div class="row">
              <div class="col-lg-11 col-md-12 mx-auto">
                  <div class="card mt-4 shadow-lg border-radius-xl">
                      <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
                          <div class="bg-gradient-info shadow-info border-radius-lg pt-4 pb-3">
                              <h6 class="text-white text-capitalize ps-3 mb-0">
                                  <i class="material-symbols-rounded me-2">medical_services</i>
                                  <span th:text="${device.id != null} ? 'Cập nhật hồ sơ thiết bị' : 'Thêm thiết bị mới vào hệ thống'">Form</span>
                              </h6>
                          </div>
                      </div>
                      
                      <div class="card-body p-4">
                          <form id="deviceForm" th:data-id="${device.id}">
                              <div class="row">
                                  <div class="col-lg-4 border-end border-gray-200">
                                      <div class="text-center px-2">
                                          <p class="text-sm font-weight-bold mb-3 text-info text-uppercase">Hình ảnh thiết bị</p>
                                          <div class="position-relative d-inline-block shadow-sm border-radius-lg overflow-hidden border">
                                              <img id="previewImg" 
                                                   th:src="${device.imageUrl != null ? device.imageUrl : '/assets/img/logo.png'}" 
                                                   class="img-fluid" 
                                                   style="height: 280px; width: 300px; object-fit: contain;" alt="Preview">
                                          </div>
                                          <div class="mt-4" sec:authorize="hasRole('ADMIN')">
                                              <label for="imageFile" class="btn btn-sm btn-outline-info mb-0">
                                                  <i class="material-symbols-rounded text-sm me-2">photo_camera</i> Chọn ảnh
                                              </label>
                                              <input type="file" id="imageFile" class="d-none" accept="image/*" onchange="previewFile()">
                                          </div>
                                      </div>
                                  </div>

                                  <div class="col-lg-8 ps-lg-4 mt-4 mt-lg-0">
                                      <div class="row">
                                          <div class="col-md-6">
                                              <div class="input-group input-group-static mb-4">
                                                  <label class="text-info font-weight-bold text-xs text-uppercase">Số Serial (Định danh)</label>
                                                  <input type="text" id="serialNumber" th:value="${device.serialNumber}" class="form-control" 
                                                         placeholder="Nhập mã định danh..."
                                                         th:readonly="${!#authorization.expression('hasRole(''ADMIN'')')}">
                                              </div>
                                          </div>
                                          <div class="col-md-6">
                                              <div class="input-group input-group-static mb-4">
                                                  <label class="text-info font-weight-bold text-xs text-uppercase">Vị trí lắp đặt</label>
                                                  <input type="text" id="location" th:value="${device.location}" class="form-control"
                                                         placeholder="Ví dụ: Phòng MRI - Tầng 1"
                                                         th:readonly="${!#authorization.expression('hasRole(''ADMIN'')')}">
                                              </div>
                                          </div>
                                      </div>

                                      <div class="row">
                                          <div class="col-md-6">
                                              <div class="input-group input-group-static mb-4">
                                                  <label for="status" class="text-info font-weight-bold text-xs text-uppercase">Trạng thái vận hành</label>
                                                  <select class="form-control" id="status">
                                                      <option value="ACTIVE" th:selected="${device.status == 'ACTIVE'}">Sẵn sàng sử dụng</option>
                                                      <option value="MAINTENANCE" th:selected="${device.status == 'MAINTENANCE'}">Đang bảo trì</option>
                                                      <option value="BROKEN" th:selected="${device.status == 'BROKEN'}">Đang gặp sự cố</option>
                                                      <option value="UNAVAILABLE" th:selected="${device.status == 'UNAVAILABLE'}">Ngừng hoạt động</option>
                                                  </select>
                                              </div>
                                          </div>
                                          <div class="col-md-6" sec:authorize="hasRole('ADMIN')">
                                              <div class="input-group input-group-static mb-4">
                                                  <label for="typeId" class="text-info font-weight-bold text-xs text-uppercase">Loại thiết bị y tế</label>
                                                  <select class="form-control" id="typeId" onchange="handleTypeChange()">
                                                      <option value="" data-manufacturer="" data-model="" data-cycle="" data-description="" data-manual-url="">Chọn loại thiết bị</option>
                                                      <option th:each="type : ${deviceTypes}" 
                                                              th:value="${type.id}" 
                                                              th:text="${type.typeName}"
                                                              th:data-manufacturer="${type.manufacturer}"
                                                              th:data-model="${type.model}"
                                                              th:data-cycle="${type.defaultMaintenanceCycle}"
                                                              th:data-description="${type.typeDescription}"
                                                              th:data-manual-url="${type.manualUrl}" 
                                                              th:selected="${device.typeId != null && type.id == device.typeId}">
                                                      </option>
                                                      <option value="NEW" class="text-info font-weight-bold">+ Thêm loại thiết bị mới...</option>
                                                  </select>
                                              </div>
                                          </div>
                                      </div>

                                      <div class="row">
                                          <div class="col-12" sec:authorize="hasRole('ADMIN')">
                                              <div class="input-group input-group-static mb-4">
                                                  <label for="companyId" class="text-info font-weight-bold text-xs text-uppercase">Công ty nhập khẩu đối tác</label>
                                                  <select class="form-control" id="companyId" onchange="handleCompanyChange()">
                                                      <option value="" data-tax="" data-contact="">Chọn doanh nghiệp đối tác</option>
                                                      <option th:each="comp : ${companies}" 
                                                              th:value="${comp.id}" 
                                                              th:text="${comp.name}"
                                                              th:data-tax="${comp.taxCode}"
                                                              th:data-contact="${comp.contactInfo}"
                                                              th:selected="${device.companyId != null && comp.id == device.companyId}">
                                                      </option>
                                                      <option value="NEW" class="text-success font-weight-bold">+ Thêm công ty phân phối mới...</option>
                                                  </select>
                                              </div>
                                          </div>
                                      </div>

                                      <div id="companyDetailSection" style="display: none;" class="bg-gray-100 p-4 border-radius-lg mb-4 shadow-inner">
                                          <h6 class="text-xs font-weight-bolder mb-3 text-dark text-uppercase">
                                              <i class="material-symbols-rounded text-sm me-1">domain</i> Thông tin doanh nghiệp cung cấp
                                          </h6>
                                          <div class="row">
                                              <div class="col-md-6" id="newCompanyInputGroup" style="display: none;">
                                                  <div class="input-group input-group-static is-filled mb-4"> 
                                                      <label class="text-info font-weight-bold text-xs text-uppercase">Tên công ty mới <span class="text-danger">*</span></label>
                                                      <input type="text" id="newCompanyName" class="form-control" placeholder="Nhập tên đơn vị...">
                                                  </div>
                                              </div>
                                              <div class="col-md-6">
                                                  <div class="input-group input-group-static is-filled mb-4"> 
                                                      <label class="text-info font-weight-bold text-xs text-uppercase">Mã số thuế</label>
                                                      <input type="text" id="companyTaxCode" class="form-control" readonly placeholder="Mã số thuế...">
                                                  </div>
                                              </div>
                                              <div class="col-12">
                                                  <div class="input-group input-group-static is-filled mb-0"> 
                                                      <label class="text-info font-weight-bold text-xs text-uppercase">Thông tin liên hệ (Địa chỉ/SĐT)</label>
                                                      <textarea id="companyContactInfo" class="form-control" rows="2" readonly placeholder="Thông tin liên hệ chi tiết..."></textarea>
                                                  </div>
                                              </div>
                                          </div>
                                      </div>

                                      <div id="typeDetailSection" style="display: none;" class="bg-gray-100 p-4 border-radius-lg mb-4 shadow-inner">
                                          <h6 class="text-xs font-weight-bolder mb-3 text-dark text-uppercase">
                                              <i class="material-symbols-rounded text-sm me-1">settings</i> Thông số kỹ thuật loại máy
                                          </h6>
                                          <div class="row">
                                              <div class="col-md-6" id="newTypeInputGroup" style="display: none;">
                                                  <div class="input-group input-group-static mb-4">
                                                      <label class="text-info font-weight-bold text-xs text-uppercase">Tên loại mới</label>
                                                      <input type="text" id="newTypeName" class="form-control">
                                                  </div>
                                              </div>
                                              <div class="col-md-6">
                                                  <div class="input-group input-group-static mb-4">
                                                      <label class="text-info font-weight-bold text-xs text-uppercase">Hãng sản xuất</label>
                                                      <input type="text" id="manufacturer" class="form-control" readonly>
                                                  </div>
                                              </div>
                                              <div class="col-md-6">
                                                  <div class="input-group input-group-static mb-4">
                                                      <label class="text-info font-weight-bold text-xs text-uppercase">Model</label>
                                                      <input type="text" id="model" class="form-control" readonly>
                                                  </div>
                                              </div>
                                              <div class="col-md-6">
                                                  <div class="input-group input-group-static mb-4">
                                                      <label class="text-info font-weight-bold text-xs text-uppercase">Chu kỳ bảo trì (Ngày)</label>
                                                      <input type="number" id="defaultMaintenanceCycle" class="form-control" readonly>
                                                  </div>
                                              </div>
                                              <div class="col-md-6">
                                                  <div class="input-group input-group-static mb-4">
                                                      <label class="text-info font-weight-bold text-xs text-uppercase">Tài liệu hướng dẫn</label>
                                                      <div class="d-flex align-items-center w-100 mt-2">
                                                          <label for="manualFile" class="btn btn-outline-info btn-sm mb-0 px-3">
                                                              <i class="material-symbols-rounded text-sm me-2">upload_file</i> Chọn tệp...
                                                          </label>
                                                          <span id="manualFileName" class="text-xs ms-3 text-secondary italic">
                                                              <th:block th:if="${device.manualUrl != null}">
                                                                  <i class="material-symbols-rounded text-xs">description</i> 
                                                                  <a th:href="${device.manualUrl}" target="_blank" class="text-info font-weight-bold">Xem tài liệu hiện tại</a>
                                                              </th:block>
                                                              <th:block th:unless="${device.manualUrl != null}">
                                                                  Chưa có tệp nào được chọn
                                                              </th:block>
                                                          </span>
                                                          <input type="file" id="manualFile" class="d-none" accept=".pdf,.doc,.docx" onchange="displayFileName()">
                                                      </div>
                                                  </div>
                                              </div>
                                              <div class="col-12">
                                                  <div class="input-group input-group-static mb-0">
                                                      <label class="text-info font-weight-bold text-xs text-uppercase">Mô tả chi tiết kỹ thuật</label>
                                                      <textarea id="typeDescription" class="form-control" rows="2" readonly placeholder="Mô tả các tính năng đặc thù của dòng máy này..."></textarea>
                                                  </div>
                                              </div>
                                          </div>
                                      </div>

                                      <div class="input-group input-group-static mb-4">
                                          <label class="text-info font-weight-bold text-xs text-uppercase">Ghi chú kỹ thuật</label>
                                          <textarea id="notes" class="form-control" rows="3" 
                                                    th:text="${device.notes}"
                                                    placeholder="Nhập ghi chú vận hành hoặc lịch sử lắp đặt..."></textarea>
                                      </div>

                                      <div class="d-flex justify-content-end gap-2 mt-2">
                                          <a th:href="@{/devices}" class="btn btn-light mb-0">Hủy bỏ</a>
                                          <button type="button" onclick="submitForm()" class="btn bg-gradient-info mb-0 px-5">
                                              <i class="material-symbols-rounded text-sm me-2">save</i> Lưu hồ sơ
                                          </button>
                                      </div>
                                  </div>
                              </div>
                          </form>
                      </div>
                  </div>
              </div>
          </div>
      </div>
  </main>

  <script th:src="@{/assets/js/core/popper.min.js}"></script>
  <script th:src="@{/assets/js/core/bootstrap.min.js}"></script>
  <script th:src="@{/assets/js/material-dashboard.min.js(v='3.2.0')}"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    let imageChanged = false;
    let manualChanged = false;

    function displayFileName() {
        manualChanged = true; 
        const input = document.getElementById('manualFile');
        const fileNameDisplay = document.getElementById('manualFileName');
        if (input.files.length > 0) {
            fileNameDisplay.innerHTML = `<i class="material-symbols-rounded text-xs">add_circle</i> <span class="text-info font-weight-bold">${input.files[0].name}</span>`;
        }
    }

    function handleCompanyChange() {
        const select = document.getElementById('companyId');
        if (!select) return;
        
        const selectedOption = select.options[select.selectedIndex];
        
        const taxCode = selectedOption.getAttribute('data-tax') || '';
        const contactInfo = selectedOption.getAttribute('data-contact') || '';
        
        const detailSection = document.getElementById('companyDetailSection');
        const newCompanyGroup = document.getElementById('newCompanyInputGroup');

        if (select.value === 'NEW') {
            detailSection.style.display = 'block';
            newCompanyGroup.style.display = 'block';
            ["newCompanyName", "companyTaxCode", "companyContactInfo"].forEach(id => {
                const el = document.getElementById(id);
                el.value = ''; el.readOnly = false;
            });
        } else if (select.value !== "") {
            detailSection.style.display = 'block';
            newCompanyGroup.style.display = 'none';
            document.getElementById('companyTaxCode').value = taxCode;
            document.getElementById('companyContactInfo').value = contactInfo;
            
            ["companyTaxCode", "companyContactInfo"].forEach(id => {
                document.getElementById(id).readOnly = true;
            });
        } else {
            detailSection.style.display = 'none';
        }
    }

    function handleTypeChange() {
        const select = document.getElementById('typeId');
        if (!select) return;
        const selectedOption = select.options[select.selectedIndex];
        
        const manufacturer = selectedOption.getAttribute('data-manufacturer') || '';
        const model = selectedOption.getAttribute('data-model') || '';
        const cycle = selectedOption.getAttribute('data-cycle') || '';
        const description = selectedOption.getAttribute('data-description') || '';
        const manualUrl = selectedOption.getAttribute('data-manual-url') || ''; 
        
        const detailSection = document.getElementById('typeDetailSection');
        const newTypeGroup = document.getElementById('newTypeInputGroup');
        const fileNameDisplay = document.getElementById('manualFileName');

        if (select.value === 'NEW') {
            detailSection.style.display = 'block';
            newTypeGroup.style.display = 'block';
            fileNameDisplay.innerText = "Chưa có tệp nào được chọn";
            ["manufacturer", "model", "defaultMaintenanceCycle", "typeDescription", "newTypeName"].forEach(id => {
                const el = document.getElementById(id);
                el.value = ''; el.readOnly = false;
            });
        } else if (select.value !== "") {
            detailSection.style.display = 'block';
            newTypeGroup.style.display = 'none';
            document.getElementById('manufacturer').value = manufacturer;
            document.getElementById('model').value = model;
            document.getElementById('defaultMaintenanceCycle').value = cycle;
            document.getElementById('typeDescription').value = description;

            if (manualUrl) {
                fileNameDisplay.innerHTML = `<i class="material-symbols-rounded text-xs">description</i> <a href="${manualUrl}" target="_blank" class="text-info font-weight-bold">Xem tài liệu hiện tại</a>`;
            } else {
                fileNameDisplay.innerText = "Loại này chưa có tài liệu";
            }
            ["manufacturer", "model", "defaultMaintenanceCycle", "typeDescription"].forEach(id => {
                document.getElementById(id).readOnly = true;
            });
        } else {
            detailSection.style.display = 'none';
        }
    }

    function previewFile() {
        imageChanged = true; 
        const preview = document.getElementById('previewImg');
        const file = document.getElementById('imageFile').files[0];
        const reader = new FileReader();
        reader.onloadend = function () { preview.src = reader.result; }
        if (file) { reader.readAsDataURL(file); }
    }

    function submitForm() {
        const form = document.getElementById('deviceForm');
        const id = form.getAttribute('data-id');
        const url = id ? `/devices/edit/${id}` : `/devices/add`;
        const formData = new FormData();

        if (id) formData.append('id', id);
        formData.append('serialNumber', document.getElementById('serialNumber').value);
        formData.append('location', document.getElementById('location').value);
        formData.append('status', document.getElementById('status').value);
        formData.append('notes', document.getElementById('notes').value);

        const typeSelect = document.getElementById('typeId');
        if (typeSelect && typeSelect.value === 'NEW') {
            formData.append('newTypeName', document.getElementById('newTypeName').value);
            formData.append('manufacturer', document.getElementById('manufacturer').value);
            formData.append('model', document.getElementById('model').value);
            formData.append('defaultMaintenanceCycle', document.getElementById('defaultMaintenanceCycle').value);
            formData.append('typeDescription', document.getElementById('typeDescription').value);
        } else if (typeSelect && typeSelect.value !== "") {
            formData.append('typeId', typeSelect.value);
        }

        // ĐÃ ĐỒNG BỘ: Đọc chính xác id="companyId" từ giao diện
        const companySelect = document.getElementById('companyId');
        if (companySelect) {
            if (companySelect.value === 'NEW') {
                formData.append('newCompanyName', document.getElementById('newCompanyName').value);
                formData.append('companyTaxCode', document.getElementById('companyTaxCode').value);
                formData.append('companyContactInfo', document.getElementById('companyContactInfo').value);
            } else if (companySelect.value !== "") {
                formData.append('companyId', companySelect.value);
            }
        }

        const imgInp = document.getElementById('imageFile');
        if (imageChanged && imgInp && imgInp.files.length > 0) {
            formData.append('imageFile', imgInp.files[0]);
        }

        const manualInp = document.getElementById('manualFile');
        if (manualChanged && manualInp && manualInp.files.length > 0) {
            formData.append('manualFile', manualInp.files[0]);
        }

        if (companySelect && companySelect.value === 'NEW' && !document.getElementById('newCompanyName').value.trim()) {
            Swal.fire({ title: 'Lỗi nhập liệu!', text: 'Vui lòng điền tên công ty nhập khẩu mới!', icon: 'warning' });
            return;
        }

        Swal.fire({ title: 'Đang xử lý...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        fetch(url, { method: 'POST', body: formData })
        .then(async response => {
            if (response.ok) {
                Swal.fire({ title: 'Thành công!', text: 'Dữ liệu hồ sơ thiết bị đã lưu trữ thành công.', icon: 'success' })
                .then(() => { window.location.href = '/devices'; });
            } else {
                const errorMsg = await response.text();
                Swal.fire({ title: 'Lỗi!', text: errorMsg, icon: 'error' });
            }
        })
        .catch(error => { Swal.fire({ title: 'Lỗi kết nối!', text: 'Không thể kết nối đến server Cloud.', icon: 'error' }); });
    }

    window.onload = function() {
        handleTypeChange();
        handleCompanyChange();
    };
  </script>
</body>
</html>
