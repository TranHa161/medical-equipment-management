<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" th:href="@{/assets/img/logo.png}">
  <link rel="icon" type="image/png" th:href="@{/assets/img/logo.png}">
  <title>Đăng nhập - Hệ thống Quản lý Thiết bị Y tế</title>
  
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link th:href="@{/assets/css/nucleo-icons.css}" rel="stylesheet" />
  <link th:href="@{/assets/css/nucleo-svg.css}" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <link id="pagestyle" th:href="@{/assets/css/material-dashboard.css(v='3.2.0')}" rel="stylesheet" />
</head>

<body class="bg-gray-200">
  <main class="main-content mt-0">
    <div class="page-header align-items-start min-vh-100" 
         style="background-image: url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');">
      <span class="mask bg-gradient-dark opacity-6"></span>
      <div class="container my-auto">
        <div class="row">
          <div class="col-lg-4 col-md-8 col-12 mx-auto">
            <div class="card z-index-0 fadeIn3 fadeInBottom shadow-lg">
              <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
                <div class="bg-gradient-info shadow-info border-radius-lg py-3 pe-1 text-center">
                  <h4 class="text-white font-weight-bolder mt-2 mb-0">HUST MEDICAL</h4>
                  <p class="text-white text-sm">Thiết lập mật khẩu mới</p>
                </div>
              </div>
              <div class="card-body">
                <form th:action="@{/reset-password}" method="post" id="resetForm" class="text-start">
                  <input type="hidden" name="token" th:value="${token}">

                  <p class="text-center text-secondary text-xs mb-4">Mật khẩu mới phải bao gồm ít nhất 8 ký tự.</p>

                  <div class="input-group input-group-static mb-4">
                    <label class="text-info font-weight-bold text-xs">MẬT KHẨU MỚI</label>
                    <input type="password" name="newPassword" id="newPassword" class="form-control" placeholder="••••••••" required minlength="8">
                  </div>

                  <div class="input-group input-group-static mb-4">
                    <label class="text-info font-weight-bold text-xs">XÁC NHẬN MẬT KHẨU</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                  </div>

                  <div id="passwordError" class="text-danger text-xs mb-3" style="display: none;">
                    <i class="material-symbols-rounded text-xs me-1">cancel</i> Mật khẩu xác nhận không trùng khớp!
                  </div>
                  
                  <div class="text-center">
                    <button type="submit" class="btn bg-gradient-info w-100 my-4 mb-2">CẬP NHẬT MẬT KHẨU</button>
                    <a th:href="@{/login}" class="text-xs text-secondary font-weight-bold">Quay lại đăng nhập</a>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script th:src="@{/assets/js/core/popper.min.js}"></script>
  <script th:src="@{/assets/js/core/bootstrap.min.js}"></script>
  <script th:src="@{/assets/js/plugins/perfect-scrollbar.min.js}"></script>
  <script th:src="@{/assets/js/material-dashboard.min.js(v='3.2.0')}"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    const form = document.getElementById('resetForm');
    const pass = document.getElementById('newPassword');
    const confirm = document.getElementById('confirmPassword');
    const errorMsg = document.getElementById('passwordError');

    form.addEventListener('submit', function(e) {
      if (pass.value !== confirm.value) {
        e.preventDefault();
        errorMsg.style.display = 'block';
        confirm.classList.add('is-invalid');
      }
    });

    confirm.addEventListener('input', function() {
      if (pass.value === confirm.value) {
        errorMsg.style.display = 'none';
        confirm.classList.remove('is-invalid');
      }
    });
  </script>
</body>
</html>
