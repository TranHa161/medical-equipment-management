<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" th:href="@{/assets/img/logo.png}">
  <link rel="icon" type="image/png" th:href="@{/assets/img/logo.png}">
  <title>Quản lý thiết bị - HUST MEDICAL</title>
  
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link th:href="@{/assets/css/nucleo-icons.css}" rel="stylesheet" />
  <link th:href="@{/assets/css/nucleo-svg.css}" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link id="pagestyle" th:href="@{/assets/css/material-dashboard.css(v='3.2.0')}" rel="stylesheet" />
</head>

<body class="g-sidenav-show bg-gray-100">
  <aside th:replace="~{fragments/sidebar :: sidebar('devices')}"></aside>

  <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg">
    <nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
      <div class="container-fluid py-1 px-3">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
            <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="javascript:;">Tài nguyên</a></li>
            <li class="breadcrumb-item text-sm text-dark active" aria-current="page">Quản lý thiết bị</li>
          </ol>
          <h6 class="font-weight-bolder mb-0">Danh mục thiết bị y tế</h6>
        </nav>
        <div class="collapse navbar-collapse mt-sm-0 mt-2 me-md-0 me-sm-4" id="navbar">
          <form th:action="@{/devices}" method="get" class="ms-md-auto pe-md-3 d-flex align-items-center">
            <div class="input-group input-group-outline">
              <label class="form-label">Tìm theo số sêri...</label>
              <input type="text" name="keyword" th:value="${keyword}" class="form-control">
            </div>
            <button type="submit" class="btn btn-icon-only mb-0 ms-2 bg-gradient-info">
              <i class="material-symbols-rounded">search</i>
            </button>
          </form>
          <ul class="navbar-nav d-flex align-items-center justify-content-end">
            <li class="nav-item d-flex align-items-center" sec:authorize="hasRole('ADMIN')">
              <a th:href="@{devices/add}" class="btn btn-sm mb-0 me-3 bg-gradient-info">
                <i class="material-symbols-rounded text-sm">add</i> Thêm thiết bị
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

	<div class="container-fluid py-4">
	  <div class="row">
	    <div class="col-12">
	      <div class="card my-4">
	        <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
	          <div class="bg-gradient-info shadow-info border-radius-lg pt-4 pb-3">
	            <h6 class="text-white text-capitalize ps-3 mb-0">Danh sách thiết bị</h6>
	          </div>
	        </div>
	        
	        <div class="card-body px-0 pb-2">
	          <div class="table-responsive p-0">
	            <table class="table align-items-center justify-content-center mb-0">
	              <thead>
	                <tr>
	                  <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Thiết bị</th>
	                  <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Số Serial</th>
	                  <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Vị trí</th>
	                  <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Trạng thái</th>
	                  <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Bảo trì gần nhất</th>
	                </tr>
	              </thead>
	              <tbody>
	                <tr th:if="${#lists.isEmpty(deviceList)}">
	                  <td colspan="5" class="text-center py-4">
	                    <p class="text-sm font-weight-bold mb-0">Không có dữ liệu thiết bị phù hợp.</p>
	                  </td>
	                </tr>
	                
	                <tr th:each="device : ${deviceList}">
	                  <td class="px-2 py-1 align-middle">
	                    <div class="d-flex px-2 py-1">
	                      <i class="material-symbols-rounded me-3 text-info">biotech</i>
	                      <h6 class="mb-0 text-sm">
	                        <a th:href="@{/devices/detail/{id}(id=${device.id})}" 
	                           class="text-info font-weight-bold" 
	                           th:text="${device.name}">Tên máy</a>
	                      </h6>
	                    </div>
	                  </td>
	                  <td class="align-middle">
	                    <span class="text-secondary text-xs font-weight-bold" th:text="${device.serialNumber}">SN-0001</span>
	                  </td>
	                  <td class="align-middle">
	                    <span class="text-secondary text-xs font-weight-bold" th:text="${device.location}">Phòng khám</span>
	                  </td>
	                  <td class="align-middle text-center text-sm">
	                    <span class="badge badge-sm" 
	                          th:classappend="${device.status == 'ACTIVE' ? 'bg-gradient-success' : 
	                                           (device.status == 'MAINTENANCE' ? 'bg-gradient-warning' : 
	                                           (device.status == 'BROKEN' ? 'bg-gradient-danger' : 'bg-gradient-secondary'))}"
	                          th:text="${device.status == 'ACTIVE' ? 'ĐANG HOẠT ĐỘNG' : 
	                                   (device.status == 'MAINTENANCE' ? 'BẢO TRÌ' : 
	                                   (device.status == 'BROKEN' ? 'HỎNG' : 'NGỪNG HOẠT ĐỘNG'))}">
	                        Status
	                    </span>
	                  </td>
	                  <td class="align-middle text-center">
	                    <span class="text-secondary text-xs font-weight-bold" 
	                          th:text="${device.lastMaintenanceDate != null ? #temporals.format(device.lastMaintenanceDate, 'dd/MM/yyyy') : 'N/A'}"></span>
	                  </td>
	                </tr>
	              </tbody>
	            </table>
	          </div>
	        </div>
	      </div>
	    </div>
	  </div>
	</div>
  </main>
  
  <script th:src="@{/assets/js/core/popper.min.js}"></script>
    <script th:src="@{/assets/js/core/bootstrap.min.js}"></script>
    <script th:src="@{/assets/js/plugins/perfect-scrollbar.min.js}"></script>
    <script th:src="@{/assets/js/plugins/smooth-scrollbar.min.js}"></script>
    <script th:src="@{/assets/js/plugins/chartjs.min.js}"></script>
    <script th:src="@{/assets/js/material-dashboard.min.js(v='3.2.0')}"></script>
	<script>
	    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-toggle="tooltip"]'))
	    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
	      return new bootstrap.Tooltip(tooltipTriggerEl)
	    })
	  </script>
  </body>
  </html>
