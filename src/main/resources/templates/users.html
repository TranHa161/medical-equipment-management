<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" th:href="@{/assets/img/logo.png}">
  <link rel="icon" type="image/png" th:href="@{/assets/img/logo.png}">
  <title>Quản lý tài khoản - HUST MEDICAL</title>
  
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link th:href="@{/assets/css/nucleo-icons.css}" rel="stylesheet" />
  <link th:href="@{/assets/css/nucleo-svg.css}" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link id="pagestyle" th:href="@{/assets/css/material-dashboard.css(v='3.2.0')}" rel="stylesheet" />
</head>

<body class="g-sidenav-show bg-gray-100">
  <aside th:replace="~{fragments/sidebar :: sidebar('users')}"></aside>

  <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg">
      <nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
        <div class="container-fluid py-1 px-3">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
              <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="javascript:;">Tài nguyên</a></li>
              <li class="breadcrumb-item text-sm text-dark active" aria-current="page">Quản lý tài khoản</li>
            </ol>
            <h6 class="font-weight-bolder mb-0">Danh sách tài khoản</h6>
          </nav>
          <div class="collapse navbar-collapse mt-sm-0 mt-2 me-md-0 me-sm-4" id="navbar">
            <form th:action="@{/users}" method="get" class="ms-md-auto pe-md-3 d-flex align-items-center">
              <div class="input-group input-group-outline">
                <label class="form-label">Tìm theo tên người dùng...</label>
                <input type="text" name="keyword" th:value="${keyword}" class="form-control">
              </div>
              <button type="submit" class="btn btn-icon-only mb-0 ms-2 bg-gradient-info">
                <i class="material-symbols-rounded">search</i>
              </button>
            </form>
            <ul class="navbar-nav d-flex align-items-center justify-content-end">
              <li class="nav-item d-flex align-items-center">
                <a th:href="@{/users/add}" class="btn btn-sm mb-0 me-3 bg-gradient-info">
                  <i class="material-symbols-rounded text-sm">person_add</i> Thêm tài khoản
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="container-fluid py-4">
        <div class="row">
          <div class="col-12">
            <div class="card my-4">
              <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
                <div class="bg-gradient-info shadow-info border-radius-lg pt-4 pb-3">
                  <h6 class="text-white text-capitalize ps-3 mb-0">Danh sách tài khoản</h6>
                </div>
              </div>
              
              <div class="card-body px-0 pb-2">
                <div class="table-responsive p-0">
                  <table class="table align-items-center mb-0">
                    <thead>
                      <tr>
                        <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Người dùng</th>
                        <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Liên hệ</th>
                        <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Vai trò</th>
                        <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Trạng thái</th>
                        <th class="text-secondary opacity-7"></th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr th:if="${#lists.isEmpty(userList)}">
                        <td colspan="5" class="text-center py-4">
                          <p class="text-sm font-weight-bold mb-0">Không có dữ liệu người dùng phù hợp.</p>
                        </td>
                      </tr>
					  <tr th:each="user : ${userList}">
					      <td>
					          <div class="d-flex px-2 py-1">
								<div>
								    <img th:src="${user.profilePicture != null ? user.profilePicture : '/assets/img/logo.png'}" 
								         class="avatar me-3 border-radius-lg shadow" 
								         alt="user_avatar"
								         style="object-fit: cover; width: 48px; height: 48px; border: 1px solid #f0f2f5;">
								</div>
					              <div class="d-flex flex-column justify-content-center">
					                  <h6 class="mb-0 text-sm font-weight-bold" th:text="${user.fullName}">Nguyễn Văn A</h6>
					                  <p class="text-xs text-secondary mb-0" th:text="${user.username}">user01</p>
					              </div>
					          </div>
					      </td>
					      <td class="align-middle">
					          <p class="text-xs font-weight-bold mb-0 text-dark" th:text="${user.email}">email@hust.edu.vn</p>
					          <p class="text-xs text-secondary mb-0" th:text="${user.phone}">0912345678</p>
					      </td>
					      <td class="align-middle text-center text-sm">
					          <span class="badge badge-sm" 
					                th:classappend="${user.roleName == 'ADMIN' ? 'bg-gradient-dark' : 
					                                 (user.roleName == 'TECHNICIAN' ? 'bg-gradient-info' : 'bg-gradient-primary')}"
					                th:text="${user.roleName == 'ADMIN' ? 'QUẢN LÝ' : 
					                          (user.roleName == 'TECHNICIAN' ? 'KỸ THUẬT VIÊN' : 'NGƯỜI DÙNG CUỐI')}">
					              Vai trò
					          </span>
					      </td>
					      <td class="align-middle text-center">
					          <span class="badge badge-sm" 
					                th:classappend="${user.isActive ? 'bg-gradient-success' : 'bg-gradient-secondary'}"
					                th:text="${user.isActive ? 'ĐANG HOẠT ĐỘNG' : 'TẠM KHÓA'}">Status</span>
					      </td>
					      <td class="align-middle text-center">
					          <a th:href="@{/users/edit/{id}(id=${user.id})}" class="text-secondary font-weight-bold text-xs" 
					             data-bs-toggle="tooltip" title="Chỉnh sửa cấu hình tài khoản">
					              <i class="material-symbols-rounded text-sm me-1">edit</i>Chỉnh sửa
					          </a>
					      </td>
					  </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  
  <script th:src="@{/assets/js/core/popper.min.js}"></script>
    <script th:src="@{/assets/js/core/bootstrap.min.js}"></script>
    <script th:src="@{/assets/js/plugins/perfect-scrollbar.min.js}"></script>
    <script th:src="@{/assets/js/plugins/smooth-scrollbar.min.js}"></script>
    <script th:src="@{/assets/js/plugins/chartjs.min.js}"></script>
    <script th:src="@{/assets/js/material-dashboard.min.js(v='3.2.0')}"></script>
	<script>
	    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-toggle="tooltip"]'))
	    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
	      return new bootstrap.Tooltip(tooltipTriggerEl)
	    })
	  </script>
  </body>
  </html>
