<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" th:href="@{/assets/img/logo.png}">
  <link rel="icon" type="image/png" th:href="@{/assets/img/logo.png}">
  <title>Hồ sơ người dùng - HUST MEDICAL</title>
  
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link th:href="@{/assets/css/nucleo-icons.css}" rel="stylesheet" />
  <link th:href="@{/assets/css/nucleo-svg.css}" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link id="pagestyle" th:href="@{/assets/css/material-dashboard.css(v='3.2.0')}" rel="stylesheet" />
</head>

<body class="g-sidenav-show bg-gray-100">
  <aside th:replace="~{fragments/sidebar :: sidebar('profile')}"></aside>

  <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg">
    <nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
        </nav>

    <div class="container-fluid px-2 px-md-4">
      <div class="page-header min-vh-25 border-radius-xl mt-4" 
           style="background-image: url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');">
        <span class="mask bg-gradient-info opacity-4"></span>
      </div>
      
      <form th:action="@{/profile/update}" method="post" enctype="multipart/form-data">
        <div class="card card-body mx-3 mx-md-4 mt-n6 shadow-lg border-radius-xl">
          <div class="row gx-4 mb-4 mt-2">
            <div class="col-auto">
              <div class="avatar avatar-xxl position-relative">
                <img th:src="${user.profilePicture != null ? user.profilePicture : '/assets/img/logo.png'}" 
                     id="avatarPreview" alt="profile_image" 
                     class="w-100 border-radius-xl shadow-lg border-4 border-white" 
                     style="height: 110px; width: 110px; object-fit: cover;">
                
                <label for="profilePicInput" 
                       class="btn btn-sm btn-icon-only bg-gradient-info position-absolute bottom-0 end-0 mb-n2 me-n2 shadow-sm"
                       title="Thay đổi ảnh đại diện">
                  <i class="material-symbols-rounded text-xs">photo_camera</i>
                </label>
                <input type="file" name="file" id="profilePicInput" class="d-none" accept="image/*" onchange="previewAvatar()">
              </div>
            </div>
            <div class="col-auto my-auto">
              <div class="h-100">
                <h4 class="mb-1 font-weight-bolder" th:text="${user.fullName}">Tên người dùng</h4>
                <p class="mb-0 font-weight-bold text-sm text-info">
                  <i class="material-symbols-rounded text-xs me-1">verified_user</i>
                  <span th:text="${user.role.roleName == 'ADMIN' ? 'QUẢN LÝ' : 
                                  (user.role.roleName == 'TECHNICIAN' ? 'KỸ THUẬT VIÊN' : 'NGƯỜI DÙNG CUỐI')}">ROLE</span>
                </p>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-12 col-xl-6">
              <div class="card card-plain h-100 border border-radius-lg p-3">
                <div class="card-header pb-0 p-3">
                  <div class="d-flex align-items-center">
                    <i class="material-symbols-rounded text-info me-2">person_edit</i>
                    <h6 class="mb-0 font-weight-bolder">Thông tin tài khoản</h6>
                  </div>
                </div>
                <div class="card-body p-3">
                  <div th:if="${info_success}" class="alert alert-success text-white text-xs border-radius-lg" th:text="${info_success}"></div>
                  <div th:if="${info_error}" class="alert alert-danger text-white text-xs border-radius-lg" th:text="${info_error}"></div>

                  <div class="input-group input-group-static mb-4">
                    <label class="text-xs text-info font-weight-bold">Họ và tên</label>
                    <input type="text" name="fullName" th:value="${user.fullName}" class="form-control" placeholder="Nhập họ tên...">
                  </div>
                  <div class="input-group input-group-static mb-4">
                    <label class="text-xs text-info font-weight-bold">Số điện thoại</label>
                    <input type="text" name="phone" th:value="${user.phone}" class="form-control" placeholder="09xx...">
                  </div>
                  <div class="input-group input-group-static mb-4">
                    <label class="text-xs text-info font-weight-bold">Địa chỉ Email</label>
                    <input type="email" name="email" th:value="${user.email}" class="form-control" placeholder="example@hust.edu.vn">
                  </div>
                  <button type="submit" class="btn bg-gradient-info w-100 mt-2 mb-0 shadow-info border-radius-lg">
                    <i class="material-symbols-rounded text-sm me-2">save</i> Cập nhật thông tin
                  </button>
                </div>
              </div>
            </div>
            </form> <div class="col-12 col-xl-6 mt-4 mt-xl-0">
              <div class="card card-plain h-100 border border-radius-lg p-3">
                <div class="card-header pb-0 p-3">
                  <div class="d-flex align-items-center">
                    <i class="material-symbols-rounded text-dark me-2">lock_reset</i>
                    <h6 class="mb-0 font-weight-bolder">Đổi mật khẩu</h6>
                  </div>
                </div>
                <div class="card-body p-3">
                  <div th:if="${pwd_success}" class="alert alert-success text-white text-xs border-radius-lg" th:text="${pwd_success}"></div>
                  <div th:if="${pwd_error}" class="alert alert-danger text-white text-xs border-radius-lg" th:text="${pwd_error}"></div>

                  <form th:action="@{/profile/change-password}" method="post">
                    <div class="input-group input-group-static mb-4">
                      <label class="text-xs text-dark font-weight-bold">Mật khẩu hiện tại</label>
                      <input type="password" name="oldPassword" class="form-control" required placeholder="••••••••">
                    </div>
                    <div class="input-group input-group-static mb-4">
                      <label class="text-xs text-dark font-weight-bold">Mật khẩu mới</label>
                      <input type="password" name="newPassword" class="form-control" required placeholder="••••••••">
                    </div>
                    <div class="input-group input-group-static mb-4">
                      <label class="text-xs text-dark font-weight-bold">Xác nhận mật khẩu mới</label>
                      <input type="password" name="confirmPassword" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn bg-gradient-dark w-100 mt-2 mb-0 border-radius-lg">
                      <i class="material-symbols-rounded text-sm me-2">key</i> Đổi mật khẩu
                    </button>
                  </form>
                </div>
              </div>
            </div> </div> </div> </div>
  </main>

  <script th:src="@{/assets/js/core/popper.min.js}"></script>
  <script th:src="@{/assets/js/core/bootstrap.min.js}"></script>
  <script th:src="@{/assets/js/plugins/perfect-scrollbar.min.js}"></script>
  <script th:src="@{/assets/js/plugins/smooth-scrollbar.min.js}"></script>
  <script th:src="@{/assets/js/plugins/chartjs.min.js}"></script>
  <script th:src="@{/assets/js/material-dashboard.min.js(v='3.2.0')}"></script>
  
  <script>
      function previewAvatar() {
          const preview = document.getElementById('avatarPreview');
          const file = document.getElementById('profilePicInput').files[0];
          const reader = new FileReader();

          reader.onloadend = function () {
              preview.src = reader.result;
          }

          if (file) {
              reader.readAsDataURL(file);
          }
      }
    </script>
</body>
</html>
