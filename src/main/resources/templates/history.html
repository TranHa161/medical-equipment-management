<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link class="apple-touch-icon" sizes="76x76" th:href="@{/assets/img/logo.png}">
  <link class="icon" type="image/png" th:href="@{/assets/img/logo.png}">
  <title>Lịch sử bảo trì - HUST MEDICAL</title>
  
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link th:href="@{/assets/css/nucleo-icons.css}" rel="stylesheet" />
  <link th:href="@{/assets/css/nucleo-svg.css}" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link id="pagestyle" th:href="@{/assets/css/material-dashboard.css(v='3.2.0')}" rel="stylesheet" />
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .cursor-pointer { cursor: pointer !important; }
    .table td { vertical-align: middle !important; }
    .badge-status { min-width: 120px; }
    .img-evidence { height: 200px; width: 100%; object-fit: contain; background-color: #f8f9fa; border-radius: 8px; cursor: zoom-in; transition: transform 0.2s; }
    .img-evidence:hover { transform: scale(1.02); }
  </style>
</head>

<body class="g-sidenav-show bg-gray-100">
  <aside th:replace="~{fragments/sidebar :: sidebar('history')}"></aside>
  
  <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg">
    <nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
      <div class="container-fluid py-1 px-3">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
            <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="javascript:;">Dữ liệu</a></li>
            <li class="breadcrumb-item text-sm text-dark active" aria-current="page">Lịch sử bảo trì</li>
          </ol>
          <h6 class="font-weight-bolder mb-0">Lịch sử sửa chữa & Bảo trì</h6>
        </nav>
      </div>
    </nav>

    <div class="container-fluid py-4">
      <div class="row">
        <div class="col-12">
          <div class="card my-4">
            <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
              <div class="bg-gradient-info shadow-dark border-radius-lg pt-4 pb-3">
                <h6 class="text-white text-capitalize ps-3 mb-0">Nhật ký hoạt động & Phê duyệt chi phí</h6>
              </div>
            </div>
            
            <div class="card-body px-0 pb-2">
              <div class="table-responsive p-0">
                <table class="table align-items-center mb-0">
                  <thead>
                    <tr>
                      <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Thiết bị / Serial</th>
                      <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Kỹ thuật viên</th>
                      <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Thời gian</th>
                      <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Nội dung</th>
                      <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Chi phí</th>
                      <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Trạng thái & Thao tác</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:if="${#lists.isEmpty(historyList)}">
                      <td colspan="6" class="text-center py-4">
                        <p class="text-sm font-weight-bold mb-0">Chưa có bản ghi nào.</p>
                      </td>
                    </tr>
                    <tr th:each="h : ${historyList}">
                      <td>
                        <div class="d-flex px-2 py-1">
                          <div class="d-flex flex-column justify-content-center">
                            <h6 class="mb-0 text-sm" th:text="${h.deviceName}">Máy...</h6>
                            <p class="text-xs text-secondary mb-0" th:text="${h.deviceSerial}">Serial</p>
                          </div>
                        </div>
                      </td>
                      <td><span class="text-xs font-weight-bold" th:text="${h.technicianName}">Tech</span></td>
                      <td class="align-middle text-center">
                        <span class="text-secondary text-xs font-weight-bold" 
                              th:text="${#temporals.format(h.maintenanceDate, 'dd/MM/yyyy HH:mm')}">Time</span>
                      </td>
                      <td>
                        <p class="text-xs font-weight-bold mb-0 text-wrap" style="max-width: 150px;" th:text="${h.result}">Kết quả</p>
                      </td>
                      <td class="align-middle text-center">
                        <span class="text-dark text-xs font-weight-bolder" 
                              th:text="${h.cost != null ? #numbers.formatDecimal(h.cost, 0, 'COMMA', 0, 'POINT') + ' đ' : '0 đ'}">0 đ</span>
                      </td>
                      <td class="align-middle text-center" th:with="isEndUser=${#authorization.expression('hasRole(''ENDUSER'')')}, 
                                                                   isAccountant=${#authorization.expression('hasRole(''ACCOUNTANT'')')}">
                        <div class="d-flex flex-column align-items-center" style="gap: 8px;">
                          <span class="badge badge-sm badge-status" 
                                th:classappend="${h.status?.name() == 'PAID' || h.status?.name() == 'INVOICED' ? 'bg-gradient-success' : 
                                                (h.status?.name() == 'USER_ACCEPTED' ? 'bg-gradient-warning' : 
                                                (h.status?.name() == 'ACCOUNTANT_APPROVED' ? 'bg-gradient-info' : 
                                                (h.status?.name() == 'PENDING_ACCEPTANCE' ? 'bg-gradient-secondary' : 'bg-gradient-dark')))}"
                                th:text="${h.status?.name() == 'PENDING_ACCEPTANCE' ? 'Chờ nghiệm thu' : 
                                          h.status?.name() == 'USER_ACCEPTED' ? 'Chờ duyệt chi' : 
                                          h.status?.name() == 'ACCOUNTANT_APPROVED' || h.status?.name() == 'INVOICED' ? 'Đã duyệt chi' : 
                                          h.status?.name() == 'PAID' ? 'Đã thanh toán' : h.status}">Status</span>

                          <button type="button"
                                  class="btn btn-sm mb-0 py-1 px-3 cursor-pointer"
                                  th:classappend="${(h.status?.name() == 'PENDING_ACCEPTANCE' && isEndUser) ? 'bg-gradient-info' : 
                                                   ((h.status?.name() == 'USER_ACCEPTED' && isAccountant) ? 'bg-gradient-primary' : 'btn-outline-secondary')}"
                                  th:data-id="${h.id}"
                                  th:data-status="${h.status?.name()}"
                                  th:data-before="${h.evidenceBeforeUrl}"
                                  th:data-after="${h.evidenceAfterUrl}"
                                  th:attr="data-is-enduser=${isEndUser}, data-is-accountant=${isAccountant}"
                                  onclick="handleMaintenancePopup(this)">
                            
                            <th:block th:switch="${h.status?.name()}">
                                <span th:case="'PENDING_ACCEPTANCE'" th:text="${isEndUser ? 'TIẾN HÀNH NGHIỆM THU' : 'XEM CHI TIẾT'}"></span>
                                <span th:case="'USER_ACCEPTED'" th:text="${isAccountant ? 'TIẾN HÀNH DUYỆT CHI' : 'XEM CHI TIẾT'}"></span>
                                <span th:case="*">XEM CHI TIẾT</span>
                            </th:block>
                          </button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script th:src="@{/assets/js/core/popper.min.js}"></script>
  <script th:src="@{/assets/js/core/bootstrap.min.js}"></script>
  <script th:src="@{/assets/js/plugins/perfect-scrollbar.min.js}"></script>
  <script th:src="@{/assets/js/material-dashboard.min.js(v='3.2.0')}"></script>

  <script>
    window.viewFullImage = function(url, typeText) {
        Swal.fire({
            title: typeText,
            imageUrl: url,
            imageAlt: typeText,
            width: 'auto',
            maxWidth: '90vw',
            showConfirmButton: false,
            showCloseButton: true,
            background: 'rgba(0,0,0,0.03)',
            customClass: {
                image: 'img-fluid border-radius-lg shadow-lg'
            }
        });
    };

    window.handleMaintenancePopup = function(btn) {    
      const id = btn.getAttribute('data-id');
      const status = btn.getAttribute('data-status');
      const imgBefore = btn.getAttribute('data-before') || 'https://placehold.co/400x300?text=No+Image';
      const imgAfter = btn.getAttribute('data-after') || 'https://placehold.co/400x300?text=No+Image';

      const isEndUser = btn.getAttribute('data-is-enduser') === 'true';
      const isAccountant = btn.getAttribute('data-is-accountant') === 'true';

      let title = 'Chi tiết minh chứng bảo trì';
      let confirmText = '';
      let apiUrl = '';
      let isActionable = false;

      if (status === 'PENDING_ACCEPTANCE' && isEndUser) {
          title = 'Nghiệm thu kết quả sửa chữa';
          confirmText = 'Xác nhận nghiệm thu';
          apiUrl = '/history/user-accept/'; 
          isActionable = true;
      } 
      else if (status === 'USER_ACCEPTED' && isAccountant) {
          title = 'Phê duyệt chi phí & Xuất hóa đơn';
          confirmText = 'Xác nhận duyệt chi';
          apiUrl = '/history/accountant-approve/'; 
          isActionable = true;
      }

      Swal.fire({
          title: title,
          html: `
              <div class="container-fluid mt-3">
                  <div class="row">
                      <div class="col-6 text-center">
                          <p class="text-xxs font-weight-bold text-uppercase mb-2 text-secondary">Trước sửa chữa</p>
                          <img src="${imgBefore}" class="img-fluid border img-evidence shadow-sm" 
                               onclick="window.viewFullImage('${imgBefore}', 'Hình ảnh trước sửa chữa')">
                      </div>
                      <div class="col-6 text-center">
                          <p class="text-xxs font-weight-bold text-uppercase mb-2 text-secondary">Sau sửa chữa</p>
                          <img src="${imgAfter}" class="img-fluid border img-evidence shadow-sm" 
                               onclick="window.viewFullImage('${imgAfter}', 'Hình ảnh sau sửa chữa')">
                      </div>
                  </div>
                  ${isActionable ? '<div class="alert alert-info mt-3 py-2 text-white text-xs">Vui lòng đối chiếu kỹ hai ảnh minh chứng thực tế trước khi phê duyệt hệ thống.</div>' : ''}
              </div>
          `,
          width: '750px',
          showCancelButton: true,
          showConfirmButton: isActionable, 
          confirmButtonText: confirmText,
          cancelButtonText: 'Đóng',
          confirmButtonColor: '#4CAF50',
          cancelButtonColor: '#6c757d',
          reverseButtons: true
      }).then((result) => {
          if (result.isConfirmed && apiUrl && id) {
              Swal.fire({ title: 'Đang xử lý...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
              
              fetch(apiUrl + id, { 
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' }
              })
              .then(async response => {
                  const msg = await response.text();
                  if (response.ok) {
                      Swal.fire('Thành công!', msg, 'success').then(() => location.reload());
                  } else {
                      Swal.fire('Thất bại', msg || 'Có lỗi xảy ra', 'error');
                  }
              })
              .catch(() => Swal.fire('Lỗi', 'Kết nối đến máy chủ thất bại', 'error'));
          }
      });
    };
  </script>
</body>
</html>
