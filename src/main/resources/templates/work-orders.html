<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" th:href="@{/assets/img/logo.png}">
  <link rel="icon" type="image/png" th:href="@{/assets/img/logo.png}">
  <title>Phiếu công việc - HUST MEDICAL</title>
  
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link th:href="@{/assets/css/nucleo-icons.css}" rel="stylesheet" />
  <link th:href="@{/assets/css/nucleo-svg.css}" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link id="pagestyle" th:href="@{/assets/css/material-dashboard.css(v='3.2.0')}" rel="stylesheet" />
</head>

<body class="g-sidenav-show bg-gray-100">
  <aside th:replace="~{fragments/sidebar :: sidebar('work-orders')}"></aside>

  <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg">
    <nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
      <div class="container-fluid py-1 px-3">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
            <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="javascript:;">Vận hành</a></li>
            <li class="breadcrumb-item text-sm text-dark active" aria-current="page">Phiếu công việc</li>
          </ol>
          <h6 class="font-weight-bolder mb-0">Quản lý thực hiện sửa chữa</h6>
        </nav>
    </nav>

    <div class="container-fluid py-4">
      <div class="row">
        <div class="col-12">
          <div class="card my-4">
            <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
              <div class="bg-gradient-info shadow-dark border-radius-lg pt-4 pb-3">
                <h6 class="text-white text-capitalize ps-3 mb-0">
                    <span th:text="${#authorization.expression('hasRole(''ADMIN'')')} ? 'Tất cả phiếu công việc' : 'Phiếu công việc của tôi'">Danh sách</span>
                </h6>
              </div>
            </div>
            
            <div class="card-body px-0 pb-2">
              <div class="table-responsive p-0">
                <table class="table align-items-center mb-0">
					<thead>
					  <tr>
					    <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Thiết bị / Serial</th>
					    <th sec:authorize="hasRole('ADMIN')" class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Kỹ thuật viên</th>
					    <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Ngày tạo</th>
					    <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Trạng thái</th>
					    <th></th>
					  </tr>
					  <tr class="bg-gray-100">
					    <form th:action="@{/work-orders}" method="get" id="filterForm">
					      <td class="px-2 py-1">
					        <input type="text" name="deviceSearch" th:value="${deviceSearch}" 
					               class="form-control form-control-sm border border-radius-sm bg-white px-2 text-xxs" 
					               placeholder="Tên máy / Serial...">
					      </td>
					      
					      <td sec:authorize="hasRole('ADMIN')" class="px-2 py-1">
					        <input type="text" name="techSearch" th:value="${techSearch}" 
					               class="form-control form-control-sm border border-radius-sm bg-white px-2 text-xxs" 
					               placeholder="Kỹ thuật viên...">
					      </td>

						  <td class="px-2 py-1">
						      <div class="d-flex align-items-center justify-content-center" style="gap: 8px;">
						          <input type="date" name="startDate" th:value="${startDate}" 
						                 class="form-control form-control-sm border border-radius-sm bg-white px-2 text-xxs" 
						                 style="max-width: 140px; height: 32px;">
						          
						          <span class="text-secondary font-weight-bold" style="font-size: 12px;">~</span>
						          
						          <input type="date" name="endDate" th:value="${endDate}" 
						                 class="form-control form-control-sm border border-radius-sm bg-white px-2 text-xxs" 
						                 style="max-width: 140px; height: 32px;"> </div>
						  </td>

						  <td class="px-2 py-1 text-center text-sm">
						      <select name="status" class="form-select form-select-sm border border-radius-sm bg-white text-xxs px-2" 
						              style="height: 32px;">
						          <option value="">Tất cả</option>
						          <option th:each="s : ${T(com.example.demo.enums.WorkOrderStatus).values()}" 
						                  th:value="${s}" 
						                  th:selected="${s.name() == status}"
						                  th:text="${s.name() == 'PROGRESSING' ? 'ĐANG THỰC HIỆN' : 
						                           (s.name() == 'COMPLETED' ? 'HOÀN THÀNH' : 
						                           (s.name() == 'CANCELLED' ? 'ĐÃ HỦY' : s))}">
						          </option>
						      </select>
						  </td>

					      <td class="px-2 py-1 text-center">
					          <div class="d-flex align-items-center justify-content-center">
					              <button type="submit" class="btn btn-link p-0 m-0 me-2">
					                  <i class="material-symbols-rounded text-sm text-info">filter_alt</i>
					              </button>
					              <a th:href="@{/work-orders}">
					                  <i class="material-symbols-rounded text-sm text-danger">restart_alt</i>
					              </a>
					          </div>
					      </td>
					    </form>
					  </tr>
					</thead>
                  <tbody>
                    <tr th:if="${#lists.isEmpty(orderList)}">
                      <td colspan="5" class="text-center py-4">
                        <p class="text-sm font-weight-bold mb-0">Không có công việc nào đang thực hiện.</p>
                      </td>
                    </tr>
                    <tr th:each="order : ${orderList}">
                      <td>
                        <div class="d-flex px-2 py-1">
                          <div class="d-flex flex-column justify-content-center">
                            <h6 class="mb-0 text-sm" th:text="${order.deviceName}">Tên máy</h6>
                          </div>
                        </div>
                      </td>
                      <td sec:authorize="hasRole('ADMIN')">
                        <div class="d-flex align-items-center">
                            <i class="material-symbols-rounded text-sm me-2">engineering</i>
                            <span class="text-xs font-weight-bold" th:text="${order.technicianName}">Tech Name</span>
                        </div>
                      </td>
                      <td class="align-middle text-center">
                        <span class="text-secondary text-xs font-weight-bold" th:text="${#temporals.format(order.createdAt, 'HH:mm - dd/MM/yyyy')}">11/01/2026</span>
                      </td>
					  <td class="align-middle text-center">
					    <span class="badge badge-sm" 
					          th:classappend="${order.status == T(com.example.demo.enums.WorkOrderStatus).PROGRESSING ? 'bg-gradient-info' : 
					                           (order.status == T(com.example.demo.enums.WorkOrderStatus).COMPLETED ? 'bg-gradient-success' : 'bg-gradient-secondary')}"
					          th:text="${order.status}">STATUS</span>
					  </td>
					  <td class="align-middle text-end pe-4">
                        <button sec:authorize="hasRole('TECHNICIAN')" 
                                th:if="${order.status == T(com.example.demo.enums.WorkOrderStatus).PROGRESSING}"
						        th:onclick="'completeOrder(' + ${order.id} + ')'"
						        class="btn btn-sm btn-outline-success mb-0">
						    <i class="material-symbols-rounded text-sm me-1">task_alt</i> Xong
						</button>

                        <button sec:authorize="hasRole('ADMIN')" 
                                th:if="${order.status == T(com.example.demo.enums.WorkOrderStatus).PROGRESSING}"
						        th:onclick="'cancelOrder(' + ${order.id} + ')'"
						        class="btn btn-sm btn-outline-danger mb-0 ms-2">
						    <i class="material-symbols-rounded text-sm me-1">delete</i> Hủy
						</button>
			  		  </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <script th:src="@{/assets/js/core/popper.min.js}"></script>
  <script th:src="@{/assets/js/core/bootstrap.min.js}"></script>
  <script th:src="@{/assets/js/plugins/perfect-scrollbar.min.js}"></script>
  <script th:src="@{/assets/js/material-dashboard.min.js(v='3.2.0')}"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    function completeOrder(orderId) {
        Swal.fire({
            title: 'Báo cáo hoàn thành',
            html: `
                <div class="text-start">
                    <label class="form-label text-sm">Kết quả xử lý:</label>
                    <textarea id="swal-result" class="form-control border px-2" rows="3" placeholder="Máy đã hoạt động bình thường..."></textarea>
                    
                    <label class="form-label text-sm mt-3">Chi phí phát sinh (VND):</label>
                    <input id="swal-cost" type="number" class="form-control border px-2" value="0">

                    <label class="form-label text-sm mt-3">Ảnh trước khi bảo trì:</label>
                    <input id="swal-imgBefore" type="file" class="form-control border px-2" accept="image/*">

                    <label class="form-label text-sm mt-3">Ảnh sau khi bảo trì:</label>
                    <input id="swal-imgAfter" type="file" class="form-control border px-2" accept="image/*">
                </div>
            `,
            icon: 'info',
            showCancelButton: true,
            confirmButtonText: 'Xác nhận hoàn thành',
            cancelButtonText: 'Hủy',
            preConfirm: () => {
                const result = document.getElementById('swal-result').value;
                const cost = document.getElementById('swal-cost').value;
                const imgBefore = document.getElementById('swal-imgBefore').files[0];
                const imgAfter = document.getElementById('swal-imgAfter').files[0];

                if (!result) { 
                    Swal.showValidationMessage('Vui lòng nhập kết quả sửa chữa!');
                    return false;
                }

                return { result, cost, imgBefore, imgAfter };
            }
        }).then((res) => {
            if (res.isConfirmed) {
                const formData = new FormData();
                formData.append('result', res.value.result);
                formData.append('cost', res.value.cost);
                if (res.value.imgBefore) formData.append('imgBefore', res.value.imgBefore);
                if (res.value.imgAfter) formData.append('imgAfter', res.value.imgAfter);

                Swal.fire({
                    title: 'Đang tải lên...',
                    didOpen: () => { Swal.showLoading(); }
                });

                fetch(`/work-orders/complete/${orderId}`, {
                    method: 'POST',
                    body: formData
                }).then(response => {
                    if (response.ok) {
                        Swal.fire('Thành công!', 'Đã cập nhật trạng thái và tải lên hình ảnh.', 'success')
                            .then(() => location.reload());
                    } else {
                        Swal.fire('Lỗi!', 'Có lỗi xảy ra khi lưu báo cáo.', 'error');
                    }
                }).catch(err => {
                    Swal.fire('Lỗi!', 'Không thể kết nối đến server.', 'error');
                });
            }
        });
  }

    function cancelOrder(orderId) {
        Swal.fire({
            title: 'Bạn có chắc chắn?',
            text: "Lệnh sửa chữa này sẽ bị hủy và thiết bị quay lại trạng thái chờ!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'Đồng ý hủy',
            cancelButtonText: 'Quay lại'
        }).then((result) => {
            if (result.isConfirmed) {
                fetch(`/work-orders/cancel/${orderId}`, { method: 'POST' })
                .then(response => {
                    if (response.ok) {
                        Swal.fire('Đã hủy!', 'Hệ thống đã gửi mail thông báo cho kỹ thuật viên.', 'success').then(() => location.reload());
                    }
                });
            }
        });
    }
  </script>
</body>
</html>
