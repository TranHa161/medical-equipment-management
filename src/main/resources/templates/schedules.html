<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" th:href="@{/assets/img/logo.png}">
  <link rel="icon" type="image/png" th:href="@{/assets/img/logo.png}">
  <title>Lịch bảo trì - HUST MEDICAL</title>
  
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link th:href="@{/assets/css/nucleo-icons.css}" rel="stylesheet" />
  <link th:href="@{/assets/css/nucleo-svg.css}" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link id="pagestyle" th:href="@{/assets/css/material-dashboard.css(v='3.2.0')}" rel="stylesheet" />
</head>

<body class="g-sidenav-show bg-gray-100">
  <aside th:replace="~{fragments/sidebar :: sidebar('schedules')}"></aside>

    <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg">
		<nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
		  <div class="container-fluid py-1 px-3">
		    <nav aria-label="breadcrumb">
		      <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
		        <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="javascript:;">Vận hành</a></li>
		        <li class="breadcrumb-item text-sm text-dark active" aria-current="page">Lịch bảo trì</li>
		      </ol>
		      <h6 class="font-weight-bolder mb-0">Danh sách kế hoạch bảo trì</h6>
		    </nav>
		    
		    <div class="collapse navbar-collapse mt-sm-0 mt-2 me-md-0 me-sm-4" id="navbar">
		      <ul class="navbar-nav d-flex align-items-center justify-content-end ms-auto">
		        <li class="nav-item d-flex align-items-center" sec:authorize="hasRole('ADMIN')">
		          <a th:href="@{/schedules/add}" class="btn btn-sm mb-0 bg-gradient-info">
		            <i class="material-symbols-rounded text-sm">calendar_add_on</i> Thiết lập lịch mới
		          </a>
		        </li>
		      </ul>
		    </div>
		  </div>
		</nav>

      <div class="container-fluid py-4">
        <div class="row">
          <div class="col-12">
            <div class="card my-4">
              <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
                <div class="bg-gradient-info shadow-info border-radius-lg pt-4 pb-3">
                  <h6 class="text-white text-capitalize ps-3 mb-0">Lịch trình bảo trì định kỳ</h6>
                </div>
              </div>
              
              <div class="card-body px-0 pb-2">
                <div class="table-responsive p-0">
                  <table class="table align-items-center justify-content-center mb-0">
					<thead>
					  <tr>
					    <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Thiết bị</th>
					    <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Loại bảo trì</th>
					    <th class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Chu kỳ</th>
					    <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Ngày bắt đầu</th>
					    <th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Trạng thái</th>
					    <th sec:authorize="hasRole('ADMIN')" class="text-secondary opacity-7"></th>
					  </tr>
					  <tr class="bg-gray-100">
					    <form th:action="@{/schedules}" method="get" id="filterForm">
					      <td class="px-2 py-1">
					        <input type="text" name="keyword" th:value="${keyword}" 
					               class="form-control form-control-sm border border-radius-sm bg-white px-2 text-xxs" 
					               style="height: 32px;" placeholder="Tên / Serial...">
					      </td>
						  <td class="px-2 py-1">
						      <select name="type" class="form-select form-select-sm border border-radius-sm bg-white text-xxs px-2" 
						              style="height: 32px;">
						          <option value="">Tất cả</option>
						          <option th:each="t : ${T(com.example.demo.enums.ScheduleType).values()}" 
						                  th:value="${t}" 
						                  th:selected="${t.name() == type}"
						                  th:text="${t.name() == 'DAILY' ? 'NGÀY' : 
						                           (t.name() == 'WEEKLY' ? 'TUẦN' : 
						                           (t.name() == 'MONTHLY' ? 'THÁNG' : 
						                           (t.name() == 'YEARLY' ? 'NĂM' : t)))}">
						          </option>
						      </select>
						  </td>
					      <td class="px-2 py-1">
					        <input type="number" name="cycle" th:value="${cycle}" 
					               class="form-control form-control-sm border border-radius-sm bg-white px-2 text-xxs" 
					               style="height: 32px;" placeholder="Số đơn vị...">
					      </td>
					      <td class="px-2 py-1">
					          <div class="d-flex align-items-center justify-content-center">
					              <input type="date" name="startDate" th:value="${startDate}" 
					                     class="form-control form-control-sm border border-radius-sm bg-white px-2 text-xxs" 
					                     style="max-width: 140px; height: 32px;">
					          </div>
					      </td>
					      <td class="px-2 py-1">
					        <select name="active" class="form-select form-select-sm border border-radius-sm bg-white text-xxs px-2" 
					                style="height: 32px;">
					            <option value="">Tất cả</option>
					            <option value="true" th:selected="${active == 'true'}">ĐANG CHẠY</option>
					            <option value="false" th:selected="${active == 'false'}">TẠM DỪNG</option>
					        </select>
					      </td>
					      <td class="px-2 py-1 text-center">
					          <div class="d-flex align-items-center justify-content-center">
					              <button type="submit" class="btn btn-link p-0 m-0 me-2" title="Lọc dữ liệu">
					                  <i class="material-symbols-rounded text-sm text-info">filter_alt</i>
					              </button>
					              <a th:href="@{/schedules}" title="Làm mới bộ lọc">
					                  <i class="material-symbols-rounded text-sm text-danger">restart_alt</i>
					              </a>
					          </div>
					      </td>
					    </form>
					  </tr>
					</thead>
                    <tbody>
                      <tr th:if="${#lists.isEmpty(scheduleList)}">
                        <td colspan="6" class="text-center py-4">
                          <p class="text-sm font-weight-bold mb-0">Chưa có lịch bảo trì nào được thiết lập.</p>
                        </td>
                      </tr>
                      <tr th:each="sch : ${scheduleList}">
                        <td>
                          <div class="d-flex px-2 py-1">
                            <i class="material-symbols-rounded me-3">calendar_month</i>
                            <h6 class="mb-0 text-sm" th:text="${sch.deviceName}">Máy MRI</h6>
                          </div>
                        </td>
						<td>
						  <p class="text-xs font-weight-bold mb-0" 
						     th:text="${sch.scheduleType.name() == 'DAILY' ? 'NGÀY' : 
						               (sch.scheduleType.name() == 'WEEKLY' ? 'TUẦN' : 
						               (sch.scheduleType.name() == 'MONTHLY' ? 'THÁNG' : 
						               (sch.scheduleType.name() == 'YEARLY' ? 'NĂM' : 'KHÁC')))}">
						  </p>
						</td>
                        <td>
                          <p class="text-xs font-weight-bold mb-0" th:text="${sch.cycleValue}">6</p>
                        </td>
                        <td class="text-center text-xs font-weight-bold" 
                            th:text="${sch.startDate != null ? #temporals.format(sch.startDate, 'dd/MM/yyyy') : 'N/A'}"></td>
                        <td class="align-middle text-center text-sm">
                          <span class="badge badge-sm" 
                                th:classappend="${sch.isActive ? 'bg-gradient-success' : 'bg-gradient-secondary'}"
                                th:text="${sch.isActive ? 'ĐANG CHẠY' : 'TẠM DỪNG'}">Status</span>
                        </td>
                        
                        <td class="align-middle">
                          <a sec:authorize="hasRole('ADMIN')" 
                             th:href="@{/schedules/{id}(id=${sch.deviceId})}" 
                             class="text-secondary font-weight-bold text-xs" 
                             data-toggle="tooltip" data-original-title="Sửa lịch trình">
                            Chỉnh sửa
                          </a>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    
	<script th:src="@{/assets/js/core/popper.min.js}"></script>
	   <script th:src="@{/assets/js/core/bootstrap.min.js}"></script>
	   <script th:src="@{/assets/js/plugins/perfect-scrollbar.min.js}"></script>
	   <script th:src="@{/assets/js/plugins/smooth-scrollbar.min.js}"></script>
	   <script th:src="@{/assets/js/plugins/chartjs.min.js}"></script>
	   <script th:src="@{/assets/js/material-dashboard.min.js(v='3.2.0')}"></script>
    <script>
      var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-toggle="tooltip"]'))
      var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
      })
    </script>
  </body>
  </html>
