name: Build, Push and Deploy Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: tranha161/medical-web:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
    - name: SSH to AWS EC2 and Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop medical-app || true
          docker rm medical-app || true
          
          docker rmi tranha161/medical-web:latest || true
          
          docker pull tranha161/medical-web:latest

          docker run -d -p 8080:8080 \
            --name medical-app \
            -e VNPAY_RETURN_URL="${{ secrets.VNPAY_RETURN_URL }}" \
            -e JAVA_OPTS="-Dcloud.aws.credentials.access-key=${{ secrets.AWS_ACCESS_KEY }} -Dcloud.aws.credentials.secret-key=${{ secrets.AWS_SECRET_KEY }} -Dcloud.aws.region.static=ap-southeast-1" \
            --restart always \
            tranha161/medical-web:latest